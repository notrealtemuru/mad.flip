<body>
  <div class="page">
    <!-- Баннер наверху -->
    <div class="banner">
      <img src="images/mad-universe.jpg" alt="Mad Universe" class="banner-image" />
    </div>

    <!-- Блок игры -->
    <div class="game-wrapper">
      <h1 class="title">MAD FLIP</h1>

      <div class="stats">
        <span>Moves: <span id="moves">0</span></span>
      </div>

      <div class="grid-wrapper">
        <div id="grid" class="grid"></div>
      </div>
    </div>
  </div>

  <!-- Модалка победы как раньше -->
  <div id="win-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Победа!</h2>
      <p>Ты нашёл все пары.</p>
      <button id="restart-btn">Начать заново</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
